<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lantern{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/lantern.svg">
  <script>window.LANTERN_PIN_ENABLED = {{ pin_enabled | tojson }};</script>
  <script src="/static/pin.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><img src="/static/lantern.svg" alt="" class="brand-logo"> Lantern</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/queue">Print Queue</a>
      <a href="/new">New Sheet</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  {% if insecure_pin %}
  <div class="warn-bar">⚠️ The PIN is still the default <code>changeme</code>.
    Set <code>EDIT_PIN</code> to a real value before going live.</div>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-foot">
    <img src="/static/lantern.svg" alt="" class="foot-mark">
    <span>Lantern · <a href="{{ repo_url }}" target="_blank" rel="noopener">{{ repo_url_display }}</a></span>
  </footer>
</body>
</html>
