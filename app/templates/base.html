<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lantern{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/"><img src="/static/lantern-logo.png" alt="" class="brand-logo"> Lantern</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/queue">Print Queue</a>
      <a href="/new">New Sheet</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
