# Lantern on TrueNAS SCALE — bind-mounts /data to a host dataset so TrueNAS
# snapshots back up all sheets (with git history), the usage log, custom
# templates, and the uploaded logo.
#
# 1. Create a dataset, e.g.  tank/apps/lantern  (Datasets → Add).
# 2. Copy deploy/truenas/.env.example to .env here and fill it in.
# 3. From this directory:  docker compose up -d --build
#    (or add as a Custom App / Compose workload in the SCALE UI).
#
# See docs/truenas.md for the full walkthrough.

services:
  lantern:
    build: ../..              # build from the repo root; or set `image:` to a prebuilt tag
    image: lantern:latest
    container_name: lantern
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # The address phones on the LAN will hit (the QR codes encode this).
      BASE_URL: "${BASE_URL:?set BASE_URL to the server's LAN address, e.g. http://192.168.1.50:8080}"
      # Refuse to start without a real Space PIN (or set PIN_ENABLED=0 to run open).
      EDIT_PIN: "${EDIT_PIN:?set a real EDIT_PIN (or set PIN_ENABLED=0 to run fully open)}"
      PIN_ENABLED: "${PIN_ENABLED:-1}"
      PAGE_SIZE: "${PAGE_SIZE:-letter}"   # letter | a4
      SEED_SAMPLES: "${SEED_SAMPLES:-1}"
    volumes:
      # Bind-mount a host DATASET path -> /data so snapshots cover everything.
      - "${LANTERN_DATA:?set LANTERN_DATA to a host dataset path, e.g. /mnt/tank/apps/lantern}:/data"
